    <script>
         $(document).ready(function() {
        // Inicializa Select2 en los selects
        $('.button-container button').click(function() {
            Swal.fire({
                title: 'Selecciona una opción',
                input: 'select',
                inputOptions: {
                    'opcion1': 'Opción 1',
                    'opcion2': 'Opción 2',
                    'opcion3': 'Opción 3'
                },
                inputPlaceholder: 'Selecciona una opción',
                showCancelButton: true,
                inputValidator: function(value) {
                    return new Promise(function(resolve) {
                        if (value) {
                            resolve();
                        } else {
                            resolve('Necesitas seleccionar una opción');
                        }
                    });
                }
            }).then(function(result) {
                if (result.isConfirmed) {
                    Swal.fire({
                        icon: 'success',
                        title: '¡Seleccionaste: ' + result.value + '!'
                    });
                }
            });
        });
    });

    function reservar(numero) {
        Swal.fire({
            icon: 'info',
            title: 'Reserva de Estacionamiento',
            text: '¿Quieres reservar el estacionamiento número ' + numero + '?',
            showCancelButton: true,
            confirmButtonText: 'Sí',
            cancelButtonText: 'No',
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire(
                    'Reservado',
                    'Has reservado el estacionamiento número ' + numero + '.',
                    'success'
                );
            }
        });
    }
        document.querySelectorAll('.parking-spot').forEach(spot => {
        const span = spot.querySelector('span');
        const spotId = spot.id.replace('spot', ''); // Remueve 'spot' para dejar solo el número
        span.textContent = spotId; // Asigna el número al contenido del span
    });

    const parkingSpots = document.querySelectorAll('.parking-spot');
        parkingSpots.forEach(spot => {
            spot.addEventListener('click', () => {
                if (spot.classList.contains('reserved')) {
                    spot.classList.remove('reserved');
                } else {
                    spot.classList.add('reserved');
                }
            });
        });
    </script>
