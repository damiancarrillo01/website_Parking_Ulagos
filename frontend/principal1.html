<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Estacionamiento</title>
    <!-- CSS de Select2 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.6-rc.0/css/select2.min.css">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <!-- Script de Select2 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.6-rc.0/js/select2.min.js"></script>
    <!-- Enlace a Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Enlace a SweetAlert -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            background-color: #003DA6;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0px;
        }
        .header .menu-icon, .header .location-icon {
            font-size: 24px;
            cursor: pointer;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
        }
        .header h1 .location-icon {
            margin-right: 10px;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .button-container button {
            padding: 10px;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            font-size: 16px;
            color: #013DA0;
            background-color: #87CEEB;
        }
        .button-container button:hover {
            background-color: #cce0ff;
        }
        .container {
            display: inline-block;
            margin-top: 20px;
            width: 1400px;
            height: 503px;
            background-color: #e0e0e0;
            position: relative;
        }
        .parking-spot, .disabled-spot {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 1px solid blue;
            cursor: pointer;
        }
        .parking-spot {
            background-color: rgba(0, 0, 255, 0.3);
        }
        .disabled-spot {
            background-color: rgba(128, 128, 128, 0.5);
            cursor: not-allowed;
        }
        /* Positions for parking spots */
        /* Define your parking spot positions here */

        .reserve-button {
            margin-top: 10px;
            padding: 10px 20px;
            border: 2px solid #0056b3;
            background-color: #fff;
            color: #0056b3;
            font-size: 16px;
            cursor: pointer;
            border-radius: 20px;
        }
        .reserve-button:hover {
            background-color: #004494;
        }
        .seleccion-button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            color: white;
            background-color: #0056b3;
        }
        .digital-clock {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 20px;
        }
        .digital-clock input {
            width: 3em;
            text-align: center;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin: 0 5px;
        }
        .swal2-popup .swal2-html-container {
            padding: 20px;
        }

        .swal2-popup .swal2-actions button {
            margin: 5px;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-color {
            width: 20px;
            height: 20px;
            display: inline-block;
        }
        .status-available {
            background-color: rgba(0, 0, 255, 0.3);
        }
        .status-reserved {
            background-color: rgba(255, 0, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-bars menu-icon"></i>
    <h1><i class="fas fa-map-marker-alt location-icon"></i> Reservar Estacionamiento</h1>
    <span></span>
</div>

<div class="button-container">
    <button id="horaButton">Hora</button>
    <button id="vehiculoButton">Vehículo</button>
    <button id="edificioButton">Edificio</button>
</div>

<div id="mapContainer">
    <!-- Aquí se cargará el mapa del edificio seleccionado -->
</div>

<div class="status-bar">
    <div class="status-item">
        <div class="status-color status-available"></div>
        <span>Disponible</span>
    </div>
    <div class="status-item">
        <div class="status-color status-reserved"></div>
        <span>Reservado</span>
    </div>
</div>

<button class="reserve-button" onclick="location.href='confirmar.html'">Reservar</button>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>


    document.getElementById('edificioButton').addEventListener('click', function() {
        var idbotonJSON = localStorage.getItem('idboton');
        console.log(idbotonJSON);

        // Convertir el JSON a objeto JavaScript
        var idbotonObj = JSON.parse(idbotonJSON);
        console.log(idbotonObj);

        // Obtener el valor del ID de botón del objeto
        var idboton = idbotonObj.buttonId;
        console.log(idboton);

        console.log(idboton);
        if (idboton === 'btnMeyer') {
            Swal.fire({
                title: 'Selecciona Edificio',
                html: `
                    <button id="principalButton" class="swal2-confirm swal2-styled">Principal</button>
                `,
                showCancelButton: true,
                confirmButtonText: 'Confirmar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    mostrarMapa('principal.html'); // Function to load the map for "Ed. Principal"
                }
            });
        } else if (idboton === 'btnChuyaca') {
            Swal.fire({
                title: 'Selecciona Edificio',
                html: `
                    <button id="centralButton" class="swal2-confirm swal2-styled">Central</button>
                    <button id="itrButton" class="swal2-confirm swal2-styled">ITR</button>
                    <button id="aulasVirtualesButton" class="swal2-confirm swal2-styled">Aulas Virtuales</button>
                    <button id="saludButton" class="swal2-confirm swal2-styled">Salud</button>
                    <button id="gimnasio1Button" class="swal2-confirm swal2-styled">Gimnasio 1</button>
                `,
                showCancelButton: true,
                showConfirmButton: false
            }).then((result) => {
                if (result.isConfirmed) {
                    // Acciones específicas para cada edificio
                }
            });

            // Añadir event listeners a los botones dentro del Swal
            document.getElementById('centralButton').addEventListener('click', function() {
                mostrarMapa('central.html'); // Function to load the map for "Central"
            });
            document.getElementById('itrButton').addEventListener('click', function() {
                mostrarMapa('mapAV.html'); // Function to load the map for "ITR"
            });
            document.getElementById('aulasVirtualesButton').addEventListener('click', function() {
                mostrarMapa('aulas_virtuales.html'); // Function to load the map for "Aulas Virtuales"
            });
            document.getElementById('saludButton').addEventListener('click', function() {
                mostrarMapa('salud.html'); // Function to load the map for "Salud"
            });
            document.getElementById('gimnasio1Button').addEventListener('click', function() {
                mostrarMapa('gimnasio_1.html'); // Function to load the map for "Gimnasio 1"
            });
        } else {
            Swal.fire('Error', 'No se ha seleccionado ninguna sede.', 'error');
        }
    });

    function mostrarMapa(mapa) {
        // Cargar el mapa correspondiente al edificio seleccionado
        $('#mapContainer').load(mapa, function() {
            // Aquí puedes inicializar cualquier cosa después de cargar el mapa
            initializeMap();
        });
    }

    $(document).ready(function() {
        // Inicialización de Select2 para el selector de edificios, si es necesario
        // $('#edificioSelect').select2();

        // Lógica adicional que puedas necesitar al cargar la página
    });

    function initializeMap() {
        // Tu lógica de inicialización del mapa aquí, por ejemplo:
        document.querySelectorAll('.parking-spot').forEach(spot => {
            const span = spot.querySelector('span');
            const spotId = spot.id.replace('spot', ''); // Remueve 'spot' para dejar solo el número
            span.textContent = spotId; // Asigna el número al contenido del span
        });

        const parkingSpots = document.querySelectorAll('.parking-spot');
        parkingSpots.forEach(spot => {
            spot.addEventListener('click', () => {
                if (spot.classList.contains('reserved')) {
                    spot.classList.remove('reserved');
                } else {
                    spot.classList.add('reserved');
                }
            });
        });
    }

    // Función de ejemplo para reservar un estacionamiento
    function reservar(numero) {
        Swal.fire({
            icon: 'info',
            title: 'Reserva de Estacionamiento',
            text: '¿Quieres reservar el estacionamiento número ' + numero + '?',
            showCancelButton: true,
            confirmButtonText: 'Sí',
            cancelButtonText: 'No',
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire(
                    'Reservado',
                    'Has reservado el estacionamiento número ' + numero + '.',
                    'success'
                );
            }
        });
    }
</script>
</body>
</html>
